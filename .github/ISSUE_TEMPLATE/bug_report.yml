name: Bug Report
description: Report a bug in limux
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below so we can reproduce and fix it.

  - type: input
    id: limux-version
    attributes:
      label: limux version
      description: "Run `limux-cli version` or check About in the app."
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux distribution
      description: "Run `cat /etc/os-release | head -5`"
      placeholder: "e.g. Ubuntu 24.04, Fedora 40, Arch rolling"
    validations:
      required: true

  - type: dropdown
    id: display-server
    attributes:
      label: Display server
      options:
        - Wayland
        - X11
        - Unsure
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Built from source
        - AppImage
        - Flatpak
        - .deb / apt
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU and driver
      description: "Run `glxinfo -B | grep -E 'OpenGL (vendor|renderer|version)'` if available."
      placeholder: "e.g. Mesa Intel UHD Graphics, OpenGL 4.6"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: "A clear description of the bug."
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Minimal steps to reproduce the bug."
      placeholder: |
        1. Launch limux
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: shell-info
    attributes:
      label: Shell and environment
      description: "Which shell are you using? Any relevant env config (oh-my-zsh, starship, tmux, etc.)?"
      placeholder: "e.g. zsh with starship prompt, using tmux inside limux"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        If applicable, paste logs from `journalctl --user -e` filtered on limux, or stderr output
        from running `limux` directly in a terminal.
      render: text
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: "If applicable, add screenshots or recordings to help explain the problem."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Anything else that might be relevant (other apps running, display setup, accessibility features, etc.)."
    validations:
      required: false
