name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  ZIG_VERSION: "0.15.1"

jobs:
  rust:
    name: Build + unit tests (Rust)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-4-dev libgdk-pixbuf-2.0-dev libglib2.0-dev libcairo2-dev libpango1.0-dev \
            libwebkitgtk-6.0-dev \
            libxkbcommon-dev libx11-dev \
            xvfb

      - name: Install Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build libghostty
        run: |
          cd ghostty
          zig build -Demit-xcframework=false -Doptimize=ReleaseFast

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

      - name: MVP integration tests
        run: |
          sudo apt-get install -y python3-pytest
          xvfb-run -a scripts/run-tests-linux.sh

  daemon:
    name: Build Go daemon
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: daemon/remote/go.sum
      - run: |
          cd daemon/remote
          go build ./...
          go test ./...

  web:
    name: Web portal typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: |
          cd web
          bun install --frozen-lockfile
          bun run build
