name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # NOTE: `-D warnings` is intentionally OFF for now. The port carries ~57
  # warnings (unused imports, dead-code placeholders for Phase-5 follow-ups,
  # edition-2024 `unsafe_op_in_unsafe_fn` lints). Tracked for cleanup in
  # PORT.md's "Deferred CI work" section.
  ZIG_VERSION: "0.15.2"

jobs:
  rust:
    name: Build + unit tests (Rust)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-4-dev libgdk-pixbuf-2.0-dev libglib2.0-dev libcairo2-dev libpango1.0-dev \
            libwebkitgtk-6.0-dev \
            libxkbcommon-dev libx11-dev \
            gettext \
            xvfb

      - name: Install Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
          # Disable .zig-cache/ caching between runs. When .zig-cache is
          # restored, zig's build system concludes everything is already
          # installed and skips re-emitting artifacts to zig-out/, leaving
          # the downstream cargo link looking for a libghostty-internal.so
          # that was never produced this run. Fresh compilation every run
          # is only ~1 minute and is correctness-for-speed well spent.
          use-cache: false

      - name: Build libghostty
        run: |
          cd ghostty
          # -Dapp-runtime=none: skip the full GTK app build (we only need
          # libghostty.so for linking from Rust via the embedded apprt).
          # Default on Linux is -Dapp-runtime=gtk which pulls in libadwaita
          # and the blueprint compiler, neither of which we use.
          echo "::group::zig version and env"
          zig version
          echo "ZIG_LOCAL_CACHE_DIR=${ZIG_LOCAL_CACHE_DIR:-unset}"
          echo "ZIG_GLOBAL_CACHE_DIR=${ZIG_GLOBAL_CACHE_DIR:-unset}"
          echo "pwd=$(pwd)"
          echo "::endgroup::"

          echo "::group::zig build (verbose)"
          # --summary all: print install-step summary so we can see what got emitted
          # -Demit-lib-vt=false: without this, the libghostty-internal build
          # branch in ghostty/build.zig (which we need for our embedded-apprt
          # FFI: ghostty_surface_new, ghostty_config_new, etc.) never fires.
          # It only gates on `app-runtime=none && !emit_lib_vt`. Default
          # emit_lib_vt=true installs only libghostty-vt.* which is terminal
          # emulation but no renderer/apprt.
          zig build -Dapp-runtime=none -Demit-lib-vt=false -Demit-xcframework=false -Doptimize=ReleaseFast --summary all
          echo "::endgroup::"

          echo "::group::post-build tree"
          ls -la zig-out/ 2>&1 || echo "(no zig-out/)"
          ls -la zig-out/lib/ 2>&1 || echo "(no zig-out/lib/)"
          find . -maxdepth 5 -name 'libghostty*' 2>&1 | head -20
          echo "::endgroup::"

          # Sanity check: fail loudly if zig didn't produce the expected lib.
          # Note: zig installs as `ghostty-internal.{so,a}` (no `lib` prefix).
          # The `lib`-prefix symlinks needed for `-lghostty-internal` to resolve
          # are created later by app/build.rs during cargo build, not here.
          ls -la zig-out/lib/ghostty-internal.so zig-out/lib/ghostty-internal.a

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

      - name: MVP integration tests
        run: |
          sudo apt-get install -y python3-pytest
          xvfb-run -a scripts/run-tests-linux.sh

  daemon:
    name: Build Go daemon
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: daemon/remote/go.sum
      - run: |
          cd daemon/remote
          go build ./...
          go test ./...

  web:
    name: Web portal install check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: |
          cd web
          bun install --frozen-lockfile
      # `bun run build` is intentionally skipped: next.config.ts validates
      # runtime env vars that aren't set in CI. The web/ portal deploys via
      # Vercel where those are provided; a full build check is out of scope
      # for core CI.
